  // ============ STATE ============
  var done={};
  var expanded={};
  var openWeeks={};
  var viewedWi=0;
  var activePhase=null;

  // ============ STORAGE (mit Try/Catch) ============
  function loadDone(){
    try{
      var d=window.localStorage.getItem('om26_done');
      if(d){done=JSON.parse(d)||{};}
    }catch(e){console.log('Storage load failed',e);}
  }
  function saveDone(){
    try{window.localStorage.setItem('om26_done',JSON.stringify(done));}catch(e){console.log('Storage save failed',e);}
  }

  // ============ HELPERS ============
  function currentWeekIndex(){
    var startDate=new Date(2026,3,6); // 6. April 2026 (month is 0-indexed!)
    var now=new Date();
    var diffMs=now.getTime()-startDate.getTime();
    var diffWeeks=Math.floor(diffMs/(1000*60*60*24*7));
    if(diffWeeks<0)return 0;
    if(diffWeeks>=P.length)return P.length-1;
    return diffWeeks;
  }

  function tagClass(t){
    if(t==='Pflicht')return 'm';
    if(t==='Optional')return 'o';
    if(t==='Hügel')return 'h';
    if(t.indexOf('Kurs')===0)return 'k';
    return 'n';
  }

  function escapeHtml(s){
    if(!s)return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ============ RENDER WORKOUT CARD ============
  function renderWorkout(w){
    var isDone=!!done[w.id];
    var isExp=!!expanded[w.id];
    var icon=TM[w.ty]?TM[w.ty].i:'⚡';
    var html='<div class="wo'+(isDone?' done':'')+(w.ty==='race'?' race':'')+'" data-id="'+w.id+'">';
    html+='<div class="wo-bar '+w.ty+'"></div>';
    html+='<div class="wo-top" data-act="exp">';
    html+='<div class="wo-ic">'+icon+'</div>';
    html+='<div class="wo-info">';
    html+='<div class="wo-title">'+escapeHtml(w.ti)+'</div>';
    html+='<div class="wo-meta">'+escapeHtml(w.du)+(isDone?' · ✓ erledigt':'')+'</div>';
    html+='</div>';
    html+='<button class="wo-check" data-act="check">'+(isDone?'✓':'○')+'</button>';
    html+='</div>';
    if(w.tg&&w.tg.length){
      html+='<div class="wo-tags">';
      for(var i=0;i<w.tg.length;i++){
        html+='<span class="tag '+tagClass(w.tg[i])+'">'+escapeHtml(w.tg[i])+'</span>';
      }
      html+='</div>';
    }
    if(isExp){
      html+='<div class="wo-desc on">'+escapeHtml(w.de);
      if(w.tp){html+='<div class="tip"><b>💡</b> '+escapeHtml(w.tp)+'</div>';}
      html+='</div>';
    }
    html+='</div>';
    return html;
  }

  // ============ RENDER TODAY VIEW ============
  function renderToday(){
    if(viewedWi<0||viewedWi>=P.length)viewedWi=0;
    var wk=P[viewedWi];
    var curWi=currentWeekIndex();
    var isCur=viewedWi===curWi;

    document.getElementById('prev-btn').disabled=viewedWi<=0;
    document.getElementById('next-btn').disabled=viewedWi>=P.length-1;
    document.getElementById('today-btn').className=isCur?'today-btn':'today-btn on';

    var titleHtml=escapeHtml(wk.lb);
    if(isCur)titleHtml+='<span class="now-pill">● Jetzt</span>';
    else if(wk.ra)titleHtml+='<span class="race-pill">🏁 Race</span>';
    else if(wk.tp2)titleHtml+='<span class="taper-pill">↓ Taper</span>';
    document.getElementById('week-title').innerHTML=titleHtml;
    document.getElementById('phase-name').textContent=wk.ph;
    document.getElementById('week-dates').textContent=wk.dt;
    document.getElementById('week-vol').textContent=wk.vo;

    var mand=[];var opt=[];
    for(var i=0;i<wk.wk.length;i++){
      if(wk.wk[i].ma)mand.push(wk.wk[i]);
      else opt.push(wk.wk[i]);
    }
    var doneCount=0;
    for(var j=0;j<mand.length;j++){if(done[mand[j].id])doneCount++;}

    document.getElementById('done-count').textContent=doneCount;
    document.getElementById('total-count').textContent=mand.length;
    document.getElementById('mand-header').textContent='Pflicht-Workouts · '+doneCount+'/'+mand.length;

    var mandHtml='';for(var k=0;k<mand.length;k++){mandHtml+=renderWorkout(mand[k]);}
    document.getElementById('mand-list').innerHTML=mandHtml;

    if(opt.length>0){
      document.getElementById('opt-header').textContent='Optional · nach Gefühl';
      var optHtml='';for(var l=0;l<opt.length;l++){optHtml+=renderWorkout(opt[l]);}
      document.getElementById('opt-list').innerHTML=optHtml;
    }else{
      document.getElementById('opt-header').textContent='';
      document.getElementById('opt-list').innerHTML='';
    }
  }

  // ============ RENDER PLAN VIEW ============
  function renderPlan(){
    var phases=[];
    for(var i=0;i<P.length;i++){
      if(phases.indexOf(P[i].ph)<0)phases.push(P[i].ph);
    }
    if(!activePhase)activePhase=P[currentWeekIndex()].ph;

    var tabsHtml='';
    for(var j=0;j<phases.length;j++){
      var p=phases[j];
      var label=p.replace('Phase ','P').replace(' · ','·');
      tabsHtml+='<button class="tab'+(p===activePhase?' on':'')+'" data-phase="'+escapeHtml(p)+'">'+escapeHtml(label)+'</button>';
    }
    document.getElementById('phase-tabs').innerHTML=tabsHtml;

    var curWi=currentWeekIndex();
    var weeksHtml='';
    for(var k=0;k<P.length;k++){
      var wk=P[k];
      if(wk.ph!==activePhase)continue;
      var isOpen=!!openWeeks[k];
      var isCur=k===curWi;
      var mandCount=0;var doneInWk=0;
      for(var m=0;m<wk.wk.length;m++){
        if(wk.wk[m].ma){
          mandCount++;
          if(done[wk.wk[m].id])doneInWk++;
        }
      }
      var rowClass='wkrow'+(isCur?' cur':'')+(wk.ra?' race':'')+(isOpen?' open':'');
      weeksHtml+='<div class="'+rowClass+'" data-wi="'+k+'">';
      weeksHtml+='<div class="wkrow-h" data-act="togweek">';
      weeksHtml+='<div class="wkrow-num">'+(k+1)+'</div>';
      weeksHtml+='<div class="wkrow-info">';
      weeksHtml+='<div class="wkrow-name">'+escapeHtml(wk.lb)+'</div>';
      weeksHtml+='<div class="wkrow-date">'+escapeHtml(wk.dt)+' · '+escapeHtml(wk.vo)+'</div>';
      weeksHtml+='</div>';
      weeksHtml+='<div class="wkrow-prog">'+doneInWk+'/'+mandCount+'</div>';
      weeksHtml+='<div class="wkrow-arrow">▶</div>';
      weeksHtml+='</div>';
      if(isOpen){
        weeksHtml+='<div class="wkrow-content">';
        for(var n=0;n<wk.wk.length;n++){weeksHtml+=renderWorkout(wk.wk[n]);}
        weeksHtml+='</div>';
      }
      weeksHtml+='</div>';
    }
    document.getElementById('weeks-list').innerHTML=weeksHtml;
  }

  // ============ COUNTDOWN ============
  function updateCountdown(){
    var now=new Date();
    var ostsee=new Date(2026,7,2);
    var rom=new Date(2026,9,19);
    var next,label;
    if(now<ostsee){next=ostsee;label='OstseeMan';}
    else if(now<rom){next=rom;label='Rom HM';}
    else{document.getElementById('countdown').textContent='🏆 Done!';return;}
    var diffMs=next.getTime()-now.getTime();
    var weeks=Math.floor(diffMs/(1000*60*60*24*7));
    var days=Math.floor((diffMs%(1000*60*60*24*7))/(1000*60*60*24));
    document.getElementById('countdown').textContent=label+' · '+weeks+'w '+days+'d';
  }

  // ============ EVENT HANDLERS ============
  function handleClick(e){
    var t=e.target;

    // bottom tab bar
    var tb=t.closest?t.closest('.tb'):null;
    if(tb&&tb.dataset.view){
      var btns=document.getElementsByClassName('tb');
      for(var b=0;b<btns.length;b++){btns[b].className='tb';}
      tb.className='tb on';
      document.getElementById('view-today').className=tb.dataset.view==='today'?'view on':'view';
      document.getElementById('view-plan').className=tb.dataset.view==='plan'?'view on':'view';
      if(tb.dataset.view==='plan')renderPlan();
      else renderToday();
      window.scrollTo(0,0);
      return;
    }

    // prev/next/today
    if(t.id==='prev-btn'){if(viewedWi>0){viewedWi--;renderToday();}return;}
    if(t.id==='next-btn'){if(viewedWi<P.length-1){viewedWi++;renderToday();}return;}
    if(t.id==='today-btn'){viewedWi=currentWeekIndex();renderToday();return;}

    // workout check
    var checkBtn=t.closest?t.closest('.wo-check'):null;
    if(checkBtn){
      e.stopPropagation();
      var woCheck=checkBtn.closest('.wo');
      if(woCheck&&woCheck.dataset.id){
        if(done[woCheck.dataset.id])delete done[woCheck.dataset.id];
        else done[woCheck.dataset.id]=Date.now();
        saveDone();
        var activeView=document.querySelector('.view.on');
        if(activeView&&activeView.id==='view-today')renderToday();
        else renderPlan();
      }
      return;
    }

    // workout expand
    var woTop=t.closest?t.closest('.wo-top'):null;
    if(woTop){
      var woExp=woTop.closest('.wo');
      if(woExp&&woExp.dataset.id){
        if(expanded[woExp.dataset.id])delete expanded[woExp.dataset.id];
        else expanded[woExp.dataset.id]=true;
        var activeView2=document.querySelector('.view.on');
        if(activeView2&&activeView2.id==='view-today')renderToday();
        else renderPlan();
      }
      return;
    }

    // phase tab
    var phaseTab=t.closest?t.closest('.tab'):null;
    if(phaseTab&&phaseTab.dataset.phase){
      activePhase=phaseTab.dataset.phase;
      renderPlan();
      return;
    }

    // week toggle
    var wkH=t.closest?t.closest('.wkrow-h'):null;
    if(wkH){
      var wkRow=wkH.closest('.wkrow');
      if(wkRow&&wkRow.dataset.wi){
        var wi=parseInt(wkRow.dataset.wi,10);
        if(openWeeks[wi])delete openWeeks[wi];
        else openWeeks[wi]=true;
        renderPlan();
      }
      return;
    }
  }
